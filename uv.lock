version = 1
requires-python = ">=3.9"

[[package]]
name = "jericho"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "openenv-core" },
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "requests" },
    { name = "openai" },
    { name = "pytest" },
    { name = "groq" },
    { name = "google-generativeai" },
]

[package.metadata]
requires-dist = [
    { name = "openenv-core", specifier = ">=0.2.0" },
    { name = "fastapi", specifier = ">=0.100.0" },
    { name = "uvicorn", specifier = ">=0.20.0" },
    { name = "pydantic", specifier = ">=2.0.0" },
    { name = "requests", specifier = ">=2.28.0" },
    { name = "openai", specifier = ">=1.0.0" },
    { name = "pytest", specifier = ">=7.0.0" },
    { name = "groq" },
    { name = "google-generativeai" },
]
